<!DOCTYPE html>
<html lang="az" class="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Məhsul Detalları — AzTech</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } } }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 font-sans antialiased min-h-screen">

  <!-- Cart Overlay -->
  <div id="cart-overlay"
    class="fixed inset-0 bg-black/40 z-30 opacity-0 pointer-events-none transition-opacity duration-300"></div>

  <!-- Cart Sidebar -->
  <div id="cart-sidebar"
    class="fixed top-0 right-0 h-full w-80 max-w-full bg-white dark:bg-gray-900 shadow-2xl z-40
           translate-x-full transition-transform duration-300 flex flex-col border-l border-gray-200 dark:border-gray-800">
  </div>

  <!-- Header -->
  <header class="sticky top-0 z-20 bg-white/90 dark:bg-gray-900/90 backdrop-blur-md
                 border-b border-gray-200 dark:border-gray-800">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 h-16 flex items-center gap-4">
      <a href="index.html" class="flex items-center gap-2 shrink-0">
        <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
              d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/>
          </svg>
        </div>
        <span class="font-bold text-lg tracking-tight text-gray-900 dark:text-white">AzTech</span>
      </a>
      <div class="flex items-center gap-1 ml-auto">
        <button id="theme-btn" aria-label="Tema dəyiş"
          class="p-2.5 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors text-gray-600 dark:text-gray-400">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
          </svg>
        </button>
        <a href="favorites.html" aria-label="Sevimlilər"
          class="p-2.5 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors text-gray-600 dark:text-gray-400">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
          </svg>
        </a>
        <button id="cart-btn" aria-label="Səbət"
          class="relative p-2.5 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors text-gray-600 dark:text-gray-400">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-1.5 4h11m-9 4a1 1 0 100-2 1 1 0 000 2zm9 0a1 1 0 100-2 1 1 0 000 2z"/>
          </svg>
          <span data-cart-count
            class="hidden absolute -top-1 -right-1 bg-blue-600 text-white text-xs font-bold
                   min-w-[18px] h-[18px] rounded-full flex items-center justify-center px-1">0</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Breadcrumb -->
  <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3">
    <nav class="flex items-center gap-2 text-xs text-gray-500 dark:text-gray-400">
      <a href="index.html" class="hover:text-gray-900 dark:hover:text-white transition-colors">Əsas səhifə</a>
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
      </svg>
      <span id="breadcrumb-cat" class="text-gray-700 dark:text-gray-300"></span>
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
      </svg>
      <span id="breadcrumb-name" class="text-gray-900 dark:text-white font-medium truncate max-w-[200px]"></span>
    </nav>
  </div>

  <!-- Loading State -->
  <div id="loading-state" class="max-w-7xl mx-auto px-4 sm:px-6 py-8">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 animate-pulse">
      <div class="bg-gray-200 dark:bg-gray-800 rounded-2xl h-96"></div>
      <div class="space-y-4">
        <div class="h-6 bg-gray-200 dark:bg-gray-800 rounded w-3/4"></div>
        <div class="h-4 bg-gray-200 dark:bg-gray-800 rounded w-1/2"></div>
        <div class="h-8 bg-gray-200 dark:bg-gray-800 rounded w-1/4"></div>
        <div class="h-12 bg-gray-200 dark:bg-gray-800 rounded-xl"></div>
        <div class="space-y-2 pt-4">
          ${Array(8).fill('<div class="h-4 bg-gray-200 dark:bg-gray-800 rounded"></div>').join('')}
        </div>
      </div>
    </div>
  </div>

  <!-- Product Detail Content -->
  <main id="product-content" class="hidden max-w-7xl mx-auto px-4 sm:px-6 py-4 pb-16">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 xl:gap-12">

      <!-- Gallery -->
      <div class="space-y-3">
        <!-- Main image -->
        <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-2xl p-6 flex items-center justify-center min-h-80">
          <img id="main-image" src="" alt="" loading="eager"
            class="max-h-72 w-full object-contain transition-opacity duration-200" />
        </div>
        <!-- Thumbnails -->
        <div id="thumbnail-strip" class="flex gap-2 overflow-x-auto pb-1"></div>
      </div>

      <!-- Info Panel -->
      <div class="space-y-5">
        <div>
          <div id="product-category-badge"
            class="inline-block text-xs font-semibold text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-900/30
                   border border-blue-100 dark:border-blue-800/50 rounded-full px-3 py-1 mb-3"></div>
          <h1 id="product-name"
            class="text-xl sm:text-2xl font-bold text-gray-900 dark:text-white leading-snug"></h1>
        </div>

        <!-- Price -->
        <div id="product-price" class="text-2xl"></div>

        <!-- Warranty badge -->
        <div id="warranty-badge"></div>

        <!-- Quantity + Add to cart -->
        <div class="flex items-center gap-3 flex-wrap">
          <!-- Qty -->
          <div class="flex items-center border border-gray-200 dark:border-gray-700 rounded-xl overflow-hidden">
            <button id="qty-minus"
              class="px-4 py-3 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors font-semibold">−</button>
            <span id="qty-display"
              class="px-5 py-3 text-base font-semibold text-gray-900 dark:text-white border-x border-gray-200 dark:border-gray-700 min-w-[52px] text-center">1</span>
            <button id="qty-plus"
              class="px-4 py-3 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors font-semibold">+</button>
          </div>

          <!-- Add to cart -->
          <button id="add-cart-btn"
            class="flex-1 flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white
                   font-semibold py-3 px-6 rounded-xl transition-colors text-sm">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-1.5 4h11m-9 4a1 1 0 100-2 1 1 0 000 2zm9 0a1 1 0 100-2 1 1 0 000 2z"/>
            </svg>
            <span>Səbətə əlavə et</span>
          </button>

          <!-- Favorite -->
          <button id="fav-btn"
            class="p-3 rounded-xl border border-gray-200 dark:border-gray-700 hover:border-red-300 transition-colors">
            <svg id="fav-icon" class="w-5 h-5 text-gray-500 dark:text-gray-400"
                 fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
            </svg>
          </button>

          <!-- Compare -->
          <button id="cmp-btn"
            class="p-3 rounded-xl border border-gray-200 dark:border-gray-700 hover:border-blue-300 transition-colors"
            title="Müqayisəyə əlavə et">
            <svg id="cmp-icon" class="w-5 h-5 text-gray-500 dark:text-gray-400"
                 fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
            </svg>
          </button>
        </div>

        <!-- Source link -->
        <div id="source-link-wrap"></div>

        <!-- Specs table -->
        <div class="border border-gray-200 dark:border-gray-800 rounded-2xl overflow-hidden">
          <div class="px-4 py-3 bg-gray-50 dark:bg-gray-800/50 border-b border-gray-200 dark:border-gray-800">
            <h2 class="text-sm font-semibold text-gray-900 dark:text-white">Texniki xüsusiyyətlər</h2>
          </div>
          <table id="specs-table" class="w-full text-sm">
            <tbody id="specs-body" class="divide-y divide-gray-100 dark:divide-gray-800"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <!-- Error State -->
  <div id="error-state" class="hidden max-w-7xl mx-auto px-4 sm:px-6 py-20 text-center">
    <svg class="w-14 h-14 text-gray-300 dark:text-gray-700 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
        d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
    </svg>
    <p class="text-gray-500 dark:text-gray-400 text-sm">Məhsul tapılmadı</p>
    <a href="index.html" class="mt-4 inline-block text-blue-600 dark:text-blue-400 text-sm hover:underline">
      Əsas səhifəyə qayıt
    </a>
  </div>

  <script src="js/store.js"></script>
  <script src="js/ui.js"></script>
  <script>
  (async () => {
    UI.initDarkMode();
    UI.initToasts();

    // Cart panel
    Store.on('cart:update', () => UI.renderCartSidebar());
    Store.on('cart:panel', () => UI.renderCartSidebar());
    document.getElementById('cart-btn').addEventListener('click', () => Store.toggleCart());
    document.getElementById('cart-overlay').addEventListener('click', () => Store.closeCart());
    document.getElementById('theme-btn').addEventListener('click', UI.toggleDarkMode);
    UI.renderCartSidebar();
    UI.renderCompareBar();

    // Parse query params
    const params = new URLSearchParams(location.search);
    const type  = params.get('type');
    const index = parseInt(params.get('id'));

    const endpointMap = {
      laptop:    'laptops',
      pc:        'pcomps',
      monitor:   'monitors',
      component: 'components',
    };

    const catLabels = {
      laptop:    'Noutbuklar',
      pc:        'Personal Kompüterlər',
      monitor:   'Monitorlar',
      component: 'Hissələr',
    };

    if (!type || isNaN(index) || !endpointMap[type]) {
      document.getElementById('loading-state').classList.add('hidden');
      document.getElementById('error-state').classList.remove('hidden');
      return;
    }

    try {
      const res  = await fetch(`https://corepcdata.onrender.com/${endpointMap[type]}`);
      const data = await res.json();
      const raw  = data[index];
      if (!raw) throw new Error('Product not found');

      const productId = `${type}-${index}`;
      const product   = {
        id:         productId,
        name:       raw.name,
        price:      raw.price,
        mainImage:  raw.mainImage,
        additionalImages: raw.additionalImages || [],
        specs:      raw.specs || {},
        category:   type,
        index,
        url:        raw.url || '',
      };

      // Breadcrumb
      document.getElementById('breadcrumb-cat').textContent  = catLabels[type] || type;
      document.getElementById('breadcrumb-name').textContent = raw.name;
      document.title = `${raw.name} — AzTech`;

      // Category badge
      document.getElementById('product-category-badge').textContent = catLabels[type];

      // Name
      document.getElementById('product-name').textContent = raw.name;

      // Price
      const { current, original, discount } = Store.getPriceDisplay(raw.price);
      const priceEl = document.getElementById('product-price');
      priceEl.innerHTML = `
        <div class="flex items-center gap-3 flex-wrap">
          <span class="text-3xl font-bold text-emerald-600 dark:text-emerald-400">${current}₼</span>
          ${original ? `<span class="text-lg text-gray-400 dark:text-gray-500 line-through">${original}₼</span>` : ''}
          ${discount > 0 ? `<span class="bg-red-100 dark:bg-red-900/40 text-red-600 dark:text-red-400 text-sm font-bold px-2.5 py-1 rounded-lg">-${discount}%</span>` : ''}
          ${discount > 0 ? `<span class="text-sm text-gray-500 dark:text-gray-400">${original - current}₼ qənaət</span>` : ''}
        </div>`;

      // Warranty badge
      if (raw.specs && raw.specs['Zəmanət']) {
        document.getElementById('warranty-badge').innerHTML = `
          <div class="flex items-center gap-2 text-sm text-emerald-700 dark:text-emerald-400
                      bg-emerald-50 dark:bg-emerald-900/20 border border-emerald-200 dark:border-emerald-800/40
                      rounded-xl px-4 py-2.5 w-max">
            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04
                   A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622
                   0-1.042-.133-2.052-.382-3.016z"/>
            </svg>
            <span class="font-medium">Zəmanət: ${raw.specs['Zəmanət']}</span>
          </div>`;
      }

      // Gallery
      const allImages = [raw.mainImage, ...(raw.additionalImages || [])].filter(Boolean);
      const mainImg = document.getElementById('main-image');
      mainImg.src = raw.mainImage;
      mainImg.alt = raw.name;

      const strip = document.getElementById('thumbnail-strip');
      allImages.forEach((src, i) => {
        const btn = document.createElement('button');
        btn.className = `shrink-0 w-16 h-16 rounded-xl overflow-hidden border-2 transition-colors
                        ${i === 0 ? 'border-blue-500' : 'border-gray-200 dark:border-gray-700 hover:border-gray-400'}`;
        btn.innerHTML = `<img src="${src}" alt="" loading="lazy" class="w-full h-full object-contain bg-white dark:bg-gray-900 p-1">`;
        btn.addEventListener('click', () => {
          mainImg.style.opacity = '0';
          setTimeout(() => {
            mainImg.src = src;
            mainImg.style.opacity = '1';
          }, 100);
          strip.querySelectorAll('button').forEach((b, j) => {
            b.classList.toggle('border-blue-500', j === i);
            b.classList.toggle('border-gray-200', j !== i);
            b.classList.toggle('dark:border-gray-700', j !== i);
          });
        });
        strip.appendChild(btn);
      });

      // Specs table
      const tbody = document.getElementById('specs-body');
      Object.entries(raw.specs || {}).forEach(([k, v]) => {
        if (!k || !v) return;
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="px-4 py-2.5 w-2/5 font-medium text-gray-600 dark:text-gray-400 bg-gray-50 dark:bg-gray-900/50 align-top text-xs">${k}</td>
          <td class="px-4 py-2.5 text-gray-900 dark:text-gray-100 text-xs leading-relaxed">${v}</td>`;
        tbody.appendChild(tr);
      });

      // Source link
      if (raw.url) {
        document.getElementById('source-link-wrap').innerHTML = `
          <a href="${raw.url}" target="_blank" rel="noopener"
            class="inline-flex items-center gap-1.5 text-xs text-gray-500 dark:text-gray-400
                   hover:text-blue-600 dark:hover:text-blue-400 transition-colors">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
            </svg>
            Mağazada bax (aztechshop.az)
          </a>`;
      }

      // Quantity logic
      let qty = 1;
      const qtyDisplay = document.getElementById('qty-display');
      document.getElementById('qty-minus').addEventListener('click', () => {
        if (qty > 1) { qty--; qtyDisplay.textContent = qty; }
      });
      document.getElementById('qty-plus').addEventListener('click', () => {
        qty++;
        qtyDisplay.textContent = qty;
      });

      // Add to cart
      const cartBtn = document.getElementById('add-cart-btn');
      function updateCartBtn() {
        const inCart = Store.isInCart(productId);
        cartBtn.className = [
          'flex-1 flex items-center justify-center gap-2 font-semibold py-3 px-6 rounded-xl transition-colors text-sm',
          inCart ? 'bg-emerald-600 hover:bg-emerald-700 text-white' : 'bg-blue-600 hover:bg-blue-700 text-white'
        ].join(' ');
        cartBtn.querySelector('span').textContent = inCart ? 'Səbətdə' : 'Səbətə əlavə et';
      }
      updateCartBtn();
      cartBtn.addEventListener('click', () => {
        for (let i = 0; i < qty; i++) Store.addToCart(product);
        updateCartBtn();
      });

      // Favorite
      const favBtn  = document.getElementById('fav-btn');
      const favIcon = document.getElementById('fav-icon');
      function updateFavBtn() {
        const isFav = Store.isFavorite(productId);
        favIcon.setAttribute('fill', isFav ? 'currentColor' : 'none');
        favIcon.classList.toggle('text-red-500', isFav);
        favIcon.classList.toggle('text-gray-500', !isFav);
        favIcon.classList.toggle('dark:text-gray-400', !isFav);
      }
      updateFavBtn();
      favBtn.addEventListener('click', () => { Store.toggleFavorite(product); updateFavBtn(); });

      // Compare
      const cmpBtn  = document.getElementById('cmp-btn');
      const cmpIcon = document.getElementById('cmp-icon');
      function updateCmpBtn() {
        const inCmp = Store.inComparison(productId);
        cmpIcon.classList.toggle('text-blue-500', inCmp);
        cmpIcon.classList.toggle('text-gray-500', !inCmp);
        cmpBtn.classList.toggle('border-blue-400', inCmp);
        cmpBtn.classList.toggle('bg-blue-50', inCmp);
        cmpBtn.classList.toggle('dark:bg-blue-900/20', inCmp);
      }
      updateCmpBtn();
      cmpBtn.addEventListener('click', () => { Store.toggleCompare(product); updateCmpBtn(); UI.renderCompareBar(); });

      // Show content
      document.getElementById('loading-state').classList.add('hidden');
      document.getElementById('product-content').classList.remove('hidden');

    } catch (err) {
      console.error(err);
      document.getElementById('loading-state').classList.add('hidden');
      document.getElementById('error-state').classList.remove('hidden');
    }
  })();
  </script>
</body>
</html>
