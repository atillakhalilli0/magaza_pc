<!DOCTYPE html>
<html lang="az" class="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sevimlilər — AzTech</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } } }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 font-sans antialiased min-h-screen">

  <!-- Cart Overlay + Sidebar -->
  <div id="cart-overlay"
    class="fixed inset-0 bg-black/40 z-30 opacity-0 pointer-events-none transition-opacity duration-300"></div>
  <div id="cart-sidebar"
    class="fixed top-0 right-0 h-full w-80 max-w-full bg-white dark:bg-gray-900 shadow-2xl z-40
           translate-x-full transition-transform duration-300 flex flex-col border-l border-gray-200 dark:border-gray-800">
  </div>

  <!-- Header -->
  <header class="sticky top-0 z-20 bg-white/90 dark:bg-gray-900/90 backdrop-blur-md
                 border-b border-gray-200 dark:border-gray-800">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 h-16 flex items-center gap-4">
      <a href="index.html" class="flex items-center gap-2 shrink-0">
        <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
              d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/>
          </svg>
        </div>
        <span class="font-bold text-lg tracking-tight text-gray-900 dark:text-white">AzTech</span>
      </a>
      <div class="flex items-center gap-1 ml-auto">
        <button id="theme-btn" aria-label="Tema dəyiş"
          class="p-2.5 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors text-gray-600 dark:text-gray-400">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
          </svg>
        </button>
        <button id="cart-btn" aria-label="Səbət"
          class="relative p-2.5 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors text-gray-600 dark:text-gray-400">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-1.5 4h11m-9 4a1 1 0 100-2 1 1 0 000 2zm9 0a1 1 0 100-2 1 1 0 000 2z"/>
          </svg>
          <span data-cart-count
            class="hidden absolute -top-1 -right-1 bg-blue-600 text-white text-xs font-bold
                   min-w-[18px] h-[18px] rounded-full flex items-center justify-center px-1">0</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Page header -->
  <div class="max-w-7xl mx-auto px-4 sm:px-6 pt-8 pb-4">
    <div class="flex items-center justify-between">
      <div>
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white flex items-center gap-2">
          <svg class="w-6 h-6 text-red-500" fill="currentColor" viewBox="0 0 24 24">
            <path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
          </svg>
          Sevimlilər
        </h1>
        <p id="fav-count" class="text-sm text-gray-500 dark:text-gray-400 mt-0.5"></p>
      </div>
      <button id="clear-favs-btn"
        class="hidden text-xs text-gray-500 dark:text-gray-400 hover:text-red-500 transition-colors px-3 py-1.5 rounded-lg border border-gray-200 dark:border-gray-700 hover:border-red-300">
        Hamısını sil
      </button>
    </div>
  </div>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 py-4 pb-16">
    <div id="favorites-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4"></div>
  </main>

  <script src="js/store.js"></script>
  <script src="js/ui.js"></script>
  <script>
    UI.initDarkMode();
    UI.initToasts();

    Store.on('cart:update', () => UI.renderCartSidebar());
    Store.on('cart:panel', () => UI.renderCartSidebar());
    document.getElementById('cart-btn').addEventListener('click', () => Store.toggleCart());
    document.getElementById('cart-overlay').addEventListener('click', () => Store.closeCart());
    document.getElementById('theme-btn').addEventListener('click', UI.toggleDarkMode);
    UI.renderCartSidebar();

    function renderFavorites() {
      const grid     = document.getElementById('favorites-grid');
      const countEl  = document.getElementById('fav-count');
      const clearBtn = document.getElementById('clear-favs-btn');
      const favs     = Store.favorites;

      countEl.textContent = favs.length === 0
        ? 'Heç bir məhsul əlavə edilməyib'
        : `${favs.length} məhsul saxlanılıb`;

      clearBtn.classList.toggle('hidden', favs.length === 0);

      if (favs.length === 0) {
        grid.innerHTML = `
          <div class="col-span-full flex flex-col items-center justify-center py-24 gap-4 text-center">
            <svg class="w-16 h-16 text-gray-200 dark:text-gray-800" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1"
                d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
            </svg>
            <p class="text-gray-500 dark:text-gray-400 text-sm">Sevimlilər siyahısı boşdur</p>
            <a href="index.html"
              class="mt-2 inline-flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white text-sm
                     font-semibold px-5 py-2.5 rounded-xl transition-colors">
              Alış-verişə başla
            </a>
          </div>`;
        return;
      }

      const fragment = document.createDocumentFragment();
      favs.forEach(p => fragment.appendChild(UI.productCard(p)));
      grid.innerHTML = '';
      grid.appendChild(fragment);
    }

    Store.on('favorites:update', renderFavorites);
    Store.on('comparison:update', () => UI.renderCompareBar());

    document.getElementById('clear-favs-btn').addEventListener('click', () => {
      Store.favorites.splice(0);
      // Manually persist since we mutated directly
      localStorage.setItem('aztech_favs', '[]');
      Store.emit('favorites:update', []);
    });

    renderFavorites();
    UI.renderCompareBar();
  </script>
</body>
</html>
