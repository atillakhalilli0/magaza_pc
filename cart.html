<!DOCTYPE html>
<html lang="az" class="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Səbət — AzTech</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } } }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 font-sans antialiased min-h-screen">

  <!-- Header -->
  <header class="sticky top-0 z-20 bg-white/90 dark:bg-gray-900/90 backdrop-blur-md
                 border-b border-gray-200 dark:border-gray-800">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 h-16 flex items-center gap-4">
      <a href="index.html" class="flex items-center gap-2 shrink-0">
        <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
              d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/>
          </svg>
        </div>
        <span class="font-bold text-lg tracking-tight text-gray-900 dark:text-white">AzTech</span>
      </a>
      <div class="flex items-center gap-1 ml-auto">
        <button id="theme-btn" aria-label="Tema dəyiş"
          class="p-2.5 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors text-gray-600 dark:text-gray-400">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
          </svg>
        </button>
        <a href="favorites.html" aria-label="Sevimlilər"
          class="p-2.5 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors text-gray-600 dark:text-gray-400">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
          </svg>
        </a>
      </div>
    </div>
  </header>

  <div class="max-w-5xl mx-auto px-4 sm:px-6 pt-8 pb-4">
    <h1 class="text-2xl font-bold text-gray-900 dark:text-white flex items-center gap-2.5">
      <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-1.5 4h11m-9 4a1 1 0 100-2 1 1 0 000 2zm9 0a1 1 0 100-2 1 1 0 000 2z"/>
      </svg>
      Səbət
    </h1>
  </div>

  <main class="max-w-5xl mx-auto px-4 sm:px-6 pb-16">
    <div id="cart-content" class="grid grid-cols-1 lg:grid-cols-3 gap-6">

      <!-- Items column -->
      <div class="lg:col-span-2 space-y-3" id="cart-items-list"></div>

      <!-- Order summary -->
      <div class="lg:col-span-1">
        <div id="order-summary"
          class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-2xl p-5 sticky top-24 space-y-4">
          <h2 class="font-semibold text-gray-900 dark:text-white">Sifariş xülasəsi</h2>
          <div id="summary-rows" class="space-y-2 text-sm"></div>
          <div class="border-t border-gray-200 dark:border-gray-800 pt-4">
            <div class="flex items-center justify-between">
              <span class="font-semibold text-gray-900 dark:text-white">Cəmi</span>
              <span id="total-price" class="text-xl font-bold text-emerald-600 dark:text-emerald-400"></span>
            </div>
          </div>
          <button id="checkout-btn"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl
                   transition-colors text-sm flex items-center justify-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M5 13l4 4L19 7"/>
            </svg>
            Sifarişi tamamla
          </button>
          <a href="index.html"
            class="block text-center text-sm text-gray-500 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 transition-colors">
            Alış-verişə davam et
          </a>
        </div>
      </div>
    </div>

    <!-- Empty state -->
    <div id="cart-empty" class="hidden flex-col items-center justify-center py-24 text-center gap-5">
      <svg class="w-16 h-16 text-gray-200 dark:text-gray-800" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1"
          d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-1.5 4h11m-9 4a1 1 0 100-2 1 1 0 000 2zm9 0a1 1 0 100-2 1 1 0 000 2z"/>
      </svg>
      <div>
        <p class="font-semibold text-gray-700 dark:text-gray-300 mb-1">Səbət boşdur</p>
        <p class="text-sm text-gray-500 dark:text-gray-400">Məhsul əlavə etmək üçün mağazaya daxil olun</p>
      </div>
      <a href="index.html"
        class="inline-flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white
               font-semibold px-6 py-3 rounded-xl transition-colors text-sm">
        Alış-verişə başla
      </a>
    </div>
  </main>

  <script src="js/store.js"></script>
  <script src="js/ui.js"></script>
  <script>
    UI.initDarkMode();
    UI.initToasts();
    document.getElementById('theme-btn').addEventListener('click', UI.toggleDarkMode);

    function renderCart() {
      const cart      = Store.cart;
      const list      = document.getElementById('cart-items-list');
      const summary   = document.getElementById('order-summary');
      const empty     = document.getElementById('cart-empty');
      const content   = document.getElementById('cart-content');
      const totalEl   = document.getElementById('total-price');
      const summaryRows = document.getElementById('summary-rows');

      if (cart.length === 0) {
        content.classList.add('hidden');
        empty.classList.remove('hidden');
        empty.classList.add('flex');
        return;
      }

      content.classList.remove('hidden');
      empty.classList.add('hidden');
      empty.classList.remove('flex');

      // Items
      list.innerHTML = cart.map(item => {
        const lineTotal = Store.parsePrice(item.price) * (item.qty || 1);
        return `
          <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-2xl p-4
                      flex gap-4 items-start transition-all">
            <a href="product-detail.html?type=${item.category}&id=${item.index}"
               class="shrink-0 w-20 h-20 bg-gray-50 dark:bg-gray-800 rounded-xl flex items-center justify-center p-2">
              <img src="${item.mainImage || item.image || ''}" alt="${item.name}"
                   class="w-full h-full object-contain"
                   onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2280%22 height=%2280%22%3E%3Crect fill=%22%23f3f4f6%22 width=%2280%22 height=%2280%22/%3E%3C/svg%3E'">
            </a>
            <div class="flex-1 min-w-0">
              <a href="product-detail.html?type=${item.category}&id=${item.index}"
                 class="text-sm font-medium text-gray-900 dark:text-gray-100 line-clamp-2 hover:text-blue-600 dark:hover:text-blue-400 transition-colors">
                ${item.name}
              </a>
              <p class="text-sm font-bold text-emerald-600 dark:text-emerald-400 mt-1">${Store.parsePrice(item.price)}₼ / ədəd</p>
              <div class="flex items-center justify-between mt-3 flex-wrap gap-2">
                <!-- Qty control -->
                <div class="flex items-center border border-gray-200 dark:border-gray-700 rounded-lg overflow-hidden">
                  <button onclick="Store.updateQty('${item.id}', ${(item.qty || 1) - 1})"
                    class="px-3 py-1.5 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">−</button>
                  <span class="px-4 py-1.5 text-sm font-semibold text-gray-900 dark:text-white border-x border-gray-200 dark:border-gray-700">${item.qty || 1}</span>
                  <button onclick="Store.updateQty('${item.id}', ${(item.qty || 1) + 1})"
                    class="px-3 py-1.5 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">+</button>
                </div>
                <div class="flex items-center gap-3">
                  <span class="text-sm font-bold text-gray-900 dark:text-white">${lineTotal}₼</span>
                  <button onclick="Store.removeFromCart('${item.id}')"
                    class="text-gray-400 hover:text-red-500 transition-colors p-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                    </svg>
                  </button>
                </div>
              </div>
            </div>
          </div>`;
      }).join('');

      // Summary
      const subtotal = Store.cartTotal();
      const shipping = 0; // free shipping placeholder
      summaryRows.innerHTML = `
        <div class="flex justify-between text-gray-600 dark:text-gray-400">
          <span>Məhsullar (${Store.cartCount()} ədəd)</span>
          <span>${subtotal}₼</span>
        </div>
        <div class="flex justify-between text-gray-600 dark:text-gray-400">
          <span>Çatdırılma</span>
          <span class="text-emerald-600 dark:text-emerald-400 font-medium">Pulsuz</span>
        </div>`;
      totalEl.textContent = `${subtotal}₼`;
    }

    Store.on('cart:update', renderCart);
    renderCart();

    document.getElementById('checkout-btn').addEventListener('click', () => {
      Store.emit('toast', { type: 'success', msg: '✓ Sifarişiniz qəbul edildi!' });
    });
  </script>
</body>
</html>
