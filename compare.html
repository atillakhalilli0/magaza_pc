<!DOCTYPE html>
<html lang="az" class="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Müqayisə — AzTech</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } } }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 font-sans antialiased min-h-screen">

  <!-- Cart Overlay + Sidebar -->
  <div id="cart-overlay"
    class="fixed inset-0 bg-black/40 z-30 opacity-0 pointer-events-none transition-opacity duration-300"></div>
  <div id="cart-sidebar"
    class="fixed top-0 right-0 h-full w-80 max-w-full bg-white dark:bg-gray-900 shadow-2xl z-40
           translate-x-full transition-transform duration-300 flex flex-col border-l border-gray-200 dark:border-gray-800">
  </div>

  <!-- Header -->
  <header class="sticky top-0 z-20 bg-white/90 dark:bg-gray-900/90 backdrop-blur-md
                 border-b border-gray-200 dark:border-gray-800">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 h-16 flex items-center gap-4">
      <a href="index.html" class="flex items-center gap-2 shrink-0">
        <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
              d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/>
          </svg>
        </div>
        <span class="font-bold text-lg tracking-tight text-gray-900 dark:text-white">AzTech</span>
      </a>
      <div class="flex items-center gap-1 ml-auto">
        <button id="theme-btn" aria-label="Tema dəyiş"
          class="p-2.5 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors text-gray-600 dark:text-gray-400">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
          </svg>
        </button>
        <button id="cart-btn" aria-label="Səbət"
          class="relative p-2.5 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors text-gray-600 dark:text-gray-400">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-1.5 4h11m-9 4a1 1 0 100-2 1 1 0 000 2zm9 0a1 1 0 100-2 1 1 0 000 2z"/>
          </svg>
          <span data-cart-count
            class="hidden absolute -top-1 -right-1 bg-blue-600 text-white text-xs font-bold
                   min-w-[18px] h-[18px] rounded-full flex items-center justify-center px-1">0</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Page Header -->
  <div class="max-w-7xl mx-auto px-4 sm:px-6 pt-8 pb-4">
    <div class="flex items-center justify-between">
      <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Müqayisə</h1>
      <button onclick="Store.clearComparison(); location.reload();"
        class="text-xs text-gray-500 dark:text-gray-400 hover:text-red-500 transition-colors
               px-3 py-1.5 border border-gray-200 dark:border-gray-700 hover:border-red-300 rounded-lg">
        Təmizlə
      </button>
    </div>
  </div>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 pb-16">
    <div id="compare-content"></div>

    <!-- Empty state -->
    <div id="compare-empty" class="hidden flex-col items-center justify-center py-24 text-center gap-5">
      <svg class="w-14 h-14 text-gray-200 dark:text-gray-800" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
      </svg>
      <p class="text-gray-500 dark:text-gray-400 text-sm">Müqayisə üçün məhsul əlavə edilməyib</p>
      <a href="index.html"
        class="inline-flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white
               font-semibold px-5 py-2.5 rounded-xl transition-colors text-sm">
        Məhsullara bax
      </a>
    </div>
  </main>

  <script src="js/store.js"></script>
  <script src="js/ui.js"></script>
  <script>
    UI.initDarkMode();
    UI.initToasts();
    Store.on('cart:update', () => UI.renderCartSidebar());
    Store.on('cart:panel', () => UI.renderCartSidebar());
    document.getElementById('cart-btn').addEventListener('click', () => Store.toggleCart());
    document.getElementById('cart-overlay').addEventListener('click', () => Store.closeCart());
    document.getElementById('theme-btn').addEventListener('click', UI.toggleDarkMode);
    UI.renderCartSidebar();

    function renderComparison() {
      const items = Store.comparison;
      const content = document.getElementById('compare-content');
      const empty = document.getElementById('compare-empty');

      if (items.length < 2) {
        content.classList.add('hidden');
        empty.classList.remove('hidden');
        empty.classList.add('flex');
        return;
      }

      content.classList.remove('hidden');
      empty.classList.add('hidden');
      empty.classList.remove('flex');

      // Collect all spec keys
      const allKeys = new Set();
      items.forEach(p => Object.keys(p.specs || {}).forEach(k => k && allKeys.add(k)));
      const specKeys = [...allKeys].filter(k => k && k.trim() !== '');

      const colWidth = Math.floor(100 / (items.length + 1));

      content.innerHTML = `
        <div class="overflow-x-auto rounded-2xl border border-gray-200 dark:border-gray-800">
          <table class="w-full min-w-[600px] text-sm">
            <thead>
              <tr class="border-b border-gray-200 dark:border-gray-800">
                <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider w-32 bg-gray-50 dark:bg-gray-900/50">
                  Xüsusiyyət
                </th>
                ${items.map((p, i) => `
                  <th class="px-4 py-4 text-left bg-white dark:bg-gray-900">
                    <div class="flex flex-col gap-2">
                      <button onclick="Store.toggleCompare({id:'${p.id}'}); renderComparison();"
                        class="self-end text-gray-400 hover:text-red-500 transition-colors p-0.5 -mt-1 -mr-1">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                      </button>
                      <img src="${p.mainImage}" alt="${p.name}"
                           class="w-16 h-16 object-contain bg-gray-50 dark:bg-gray-800 rounded-xl p-1">
                      <a href="product-detail.html?type=${p.category}&id=${p.index}"
                         class="text-xs font-semibold text-gray-900 dark:text-white hover:text-blue-600 dark:hover:text-blue-400 transition-colors line-clamp-2 leading-snug">
                        ${p.name}
                      </a>
                      ${UI.priceHTML(p.price)}
                      <button onclick="Store.addToCart(${JSON.stringify(p).replace(/"/g, '&quot;')})"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white text-xs font-semibold
                               py-2 px-3 rounded-lg transition-colors mt-1">
                        Səbətə əlavə et
                      </button>
                    </div>
                  </th>`).join('')}
              </tr>
            </thead>
            <tbody class="divide-y divide-gray-100 dark:divide-gray-800">
              ${specKeys.map(key => `
                <tr class="hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors">
                  <td class="px-4 py-2.5 font-medium text-gray-500 dark:text-gray-400 text-xs bg-gray-50 dark:bg-gray-900/50 align-top">
                    ${key}
                  </td>
                  ${items.map(p => `
                    <td class="px-4 py-2.5 text-gray-800 dark:text-gray-200 text-xs align-top">
                      ${(p.specs && p.specs[key]) ? p.specs[key] : '<span class="text-gray-300 dark:text-gray-700">—</span>'}
                    </td>`).join('')}
                </tr>`).join('')}
            </tbody>
          </table>
        </div>`;
    }

    renderComparison();
  </script>
</body>
</html>
