<!DOCTYPE html>
<html lang="az" class="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AzTech — Kompüter Mağazası</title>
  <meta name="description" content="Azərbaycanın ən yaxşı kompüter mağazası. Noutbuklar, monitorlar, personal kompüterlər və hissələr.">

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
        }
      }
    }
  </script>

  <!-- Inter font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 font-sans antialiased min-h-screen">

  <!-- Cart Overlay -->
  <div id="cart-overlay"
    class="fixed inset-0 bg-black/40 z-30 opacity-0 pointer-events-none transition-opacity duration-300"></div>

  <!-- Cart Sidebar -->
  <div id="cart-sidebar"
    class="fixed top-0 right-0 h-full w-80 max-w-full bg-white dark:bg-gray-900 shadow-2xl z-40
           translate-x-full transition-transform duration-300 flex flex-col border-l border-gray-200 dark:border-gray-800">
  </div>

  <!-- ── Header ──────────────────────────────────────────────────────────── -->
  <header class="sticky top-0 z-20 bg-white/90 dark:bg-gray-900/90 backdrop-blur-md
                 border-b border-gray-200 dark:border-gray-800">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 h-16 flex items-center gap-4">

      <!-- Logo -->
      <a href="index.html" class="flex items-center gap-2 shrink-0">
        <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
              d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/>
          </svg>
        </div>
        <span class="font-bold text-lg tracking-tight text-gray-900 dark:text-white">CorePC</span>
      </a>

      <!-- Search bar — desktop -->
      <div class="flex-1 hidden sm:flex max-w-xl relative">
        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
        </span>
        <input id="search-input" type="search" placeholder="Məhsul axtar..."
          aria-label="Məhsul axtar"
          class="w-full pl-9 pr-8 py-2 text-sm bg-gray-100 dark:bg-gray-800 border border-transparent
                 rounded-xl focus:outline-none focus:border-blue-500 focus:bg-white dark:focus:bg-gray-900
                 text-gray-900 dark:text-gray-100 placeholder-gray-400 transition-colors" />
        <button id="search-clear"
          class="hidden absolute right-2.5 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <!-- Right actions -->
      <div class="flex items-center gap-1 ml-auto sm:ml-0">

        <!-- Theme toggle -->
        <button id="theme-btn" aria-label="Tema dəyiş"
          class="p-2.5 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors text-gray-600 dark:text-gray-400">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
          </svg>
        </button>

        <!-- Favorites -->
        <a href="favorites.html" aria-label="Sevimlilər"
          class="p-2.5 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors text-gray-600 dark:text-gray-400">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
          </svg>
        </a>

        <!-- Cart -->
        <button id="cart-btn" aria-label="Səbət"
          class="relative p-2.5 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors text-gray-600 dark:text-gray-400">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-1.5 4h11m-9 4a1 1 0 100-2 1 1 0 000 2zm9 0a1 1 0 100-2 1 1 0 000 2z"/>
          </svg>
          <span data-cart-count
            class="hidden absolute -top-1 -right-1 bg-blue-600 text-white text-xs font-bold
                   min-w-[18px] h-[18px] rounded-full flex items-center justify-center px-1">0</span>
        </button>
      </div>
    </div>

    <!-- Mobile search -->
    <div class="sm:hidden px-4 pb-3">
      <div class="relative">
        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
        </span>
        <input id="search-input-mobile" type="search" placeholder="Məhsul axtar..."
          class="w-full pl-9 pr-4 py-2 text-sm bg-gray-100 dark:bg-gray-800 border border-transparent
                 rounded-xl focus:outline-none focus:border-blue-500 transition-colors
                 text-gray-900 dark:text-gray-100 placeholder-gray-400" />
      </div>
    </div>
  </header>

  <!-- ── Hero ────────────────────────────────────────────────────────────── -->
  <div class="bg-gradient-to-r from-blue-700 to-blue-500 dark:from-blue-900 dark:to-blue-700">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-10 sm:py-14">
      <div class="max-w-2xl">
        <p class="text-blue-200 text-sm font-medium mb-2">Azərbaycanda #1 kompüter mağazası</p>
        <h1 class="text-3xl sm:text-4xl font-bold text-white mb-3 leading-tight">
          Texnologiyanı<br>Əlçatan edin
        </h1>
        <p class="text-blue-100 text-sm mb-6">
          Noutbuklar, monitorlar, personal kompüterlər və hissələr — 
          rəqabətli qiymətlərlə, 1 il zəmanətlə.
        </p>
        <div class="flex gap-3 flex-wrap">
          <a href="#products"
            class="inline-flex items-center gap-2 bg-white text-blue-700 font-semibold text-sm
                   px-5 py-2.5 rounded-xl hover:bg-blue-50 transition-colors">
            Məhsullara bax
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
            </svg>
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Main ────────────────────────────────────────────────────────────── -->
  <main id="products" class="max-w-7xl mx-auto px-4 sm:px-6 py-8">

    <!-- Toolbar: category tabs + sort -->
    <div class="flex flex-col sm:flex-row sm:items-center gap-4 mb-6">

      <!-- Category Tabs -->
      <nav id="category-tabs"
        class="flex items-center gap-1 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800
               rounded-xl p-1 overflow-x-auto scrollbar-none flex-1 max-w-max">
        <button data-cat="all"
          class="whitespace-nowrap px-4 py-1.5 rounded-lg text-sm font-medium transition-colors
                 bg-blue-600 text-white">
          Hamısı
        </button>
        <button data-cat="laptop"
          class="whitespace-nowrap px-4 py-1.5 rounded-lg text-sm font-medium transition-colors
                 text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white">
          💻 Noutbuklar
        </button>
        <button data-cat="pc"
          class="whitespace-nowrap px-4 py-1.5 rounded-lg text-sm font-medium transition-colors
                 text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white">
          🖥️ Personal Komp
        </button>
        <button data-cat="monitor"
          class="whitespace-nowrap px-4 py-1.5 rounded-lg text-sm font-medium transition-colors
                 text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white">
          🖵 Monitorlar
        </button>
        <button data-cat="component"
          class="whitespace-nowrap px-4 py-1.5 rounded-lg text-sm font-medium transition-colors
                 text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white">
          🔧 Hissələr
        </button>
      </nav>

      <!-- Sort + Count -->
      <div class="flex items-center gap-3 ml-auto shrink-0">
        <span id="result-count" class="text-xs text-gray-500 dark:text-gray-400 hidden sm:block"></span>
        <select id="sort-select" aria-label="Sırala"
          class="text-sm bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800
                 rounded-xl px-3 py-2 text-gray-700 dark:text-gray-300 focus:outline-none
                 focus:border-blue-500 transition-colors cursor-pointer">
          <option value="default">Standart sıralama</option>
          <option value="price-asc">Qiymət: Ucuzdan bahalıya</option>
          <option value="price-desc">Qiymət: Bahalıdan ucuza</option>
          <option value="name-asc">Ad: A–Z</option>
          <option value="discount">Endirimlər</option>
        </select>
      </div>
    </div>

    <!-- Price filter row -->
    <div class="flex items-center gap-3 mb-6 flex-wrap">
      <span class="text-xs font-medium text-gray-600 dark:text-gray-400 shrink-0">Qiymət aralığı:</span>
      <div class="flex items-center gap-2">
        <input id="price-min" type="number" placeholder="Min ₼" min="0"
          class="w-24 px-3 py-1.5 text-sm bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800
                 rounded-xl focus:outline-none focus:border-blue-500 transition-colors
                 text-gray-700 dark:text-gray-300 placeholder-gray-400" />
        <span class="text-gray-400 text-sm">–</span>
        <input id="price-max" type="number" placeholder="Max ₼" min="0"
          class="w-24 px-3 py-1.5 text-sm bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800
                 rounded-xl focus:outline-none focus:border-blue-500 transition-colors
                 text-gray-700 dark:text-gray-300 placeholder-gray-400" />
      </div>
    </div>

    <!-- Product Grid -->
    <div id="product-grid"
      class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-4 gap-4">
    </div>

  </main>

  <!-- ── Footer ──────────────────────────────────────────────────────────── -->
  <footer class="mt-16 border-t border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-8">
      <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
        <div class="flex items-center gap-2">
          <div class="w-7 h-7 bg-blue-600 rounded-lg flex items-center justify-center">
            <svg class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/>
            </svg>
          </div>
          <span class="font-semibold text-gray-900 dark:text-white">AzTech</span>
        </div>
        <nav class="flex flex-wrap gap-4 text-sm text-gray-500 dark:text-gray-400">
          <a href="index.html" class="hover:text-gray-900 dark:hover:text-white transition-colors">Əsas səhifə</a>
          <a href="favorites.html" class="hover:text-gray-900 dark:hover:text-white transition-colors">Sevimlilər</a>
          <a href="cart.html" class="hover:text-gray-900 dark:hover:text-white transition-colors">Səbət</a>
        </nav>
        <p class="text-xs text-gray-400 dark:text-gray-600">© 2024 AzTech. Bütün hüquqlar qorunur.</p>
      </div>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="js/store.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>

  <!-- Mobile search sync -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const mobileInput = document.getElementById('search-input-mobile');
      const desktopInput = document.getElementById('search-input');
      if (mobileInput && desktopInput) {
        let debounce;
        mobileInput.addEventListener('input', () => {
          clearTimeout(debounce);
          debounce = setTimeout(() => Store.setSearch(mobileInput.value), 280);
        });
      }
    });
  </script>
</body>
</html>
